<!DOCTYPE html>
<html>
<head>
    <title>FD Calculator</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:linear-gradient(135deg,#5c69c9,#00f2fe);
        }

        .container{
            width:400px;
            background:white;
            padding:25px;
            border-radius:15px;
            box-shadow:0px 5px 15px rgba(0,0,0,0.3);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        .label{
            display:flex;
            justify-content:space-between;
            margin-bottom:5px;
            font-weight:bold;
        }

        input[type=range]{
            width:100%;
            margin-bottom:20px;
        }

        button{
            width:100%;
            padding:10px;
            font-size:18px;
            border:none;
            border-radius:8px;
            background:green;
            color:white;
            cursor:pointer;
        }

        button:hover{
            background:darkgreen;
        }

        #result{
            margin-top:20px;
            text-align:center;
            font-size:18px;
            font-weight:bold;
        }

        .current{
            color:rgb(255, 0, 0);
        }
    </style>
</head>

<body>

<div class="container">

    <h2>FD Calculator</h2>
    <div><b>Investment Amount($)</b></div><br>
    <div class="label">
        <span>₹1000</span>
        <span class="current">₹<span id="pval">50000</span></span>
        <span>₹1000000</span>
    </div>

    <input type="range"
           id="p"
           min="1000"
           max="1000000"
           value="50000"
           oninput="pval.innerHTML=this.value">

    <div><b>Interest Rate(%)</b></div><br>
    <div class="label">
        <span>1%</span>
        <span class="current"><span id="rval">7</span>%</span>
        <span>18%</span>
    </div>

    <input type="range"
           id="r"
           min="1"
           max="18"
           value="7"
           oninput="rval.innerHTML=this.value">

    <div><b>Time Period</b></div><br>       
    <div class="label">
        <span>1 Year</span>
        <span class="current"><span id="tval">5</span> Years</span>
        <span>65 Years</span>
    </div>

    <input type="range"
           id="t"
           min="1"
           max="65"
           value="5"
           oninput="tval.innerHTML=this.value">

    <button onclick="calculateFD()">Calculate</button>

    <div id="result"></div>

</div>

<script>

function calculateFD(){

    let p = Number(document.getElementById("p").value);
    let r = Number(document.getElementById("r").value);
    let t = Number(document.getElementById("t").value);

    let interest = (p*r*t)/100;
    let maturity = p + interest;

    document.getElementById("result").innerHTML =
    "Interest Amount : ₹" + interest + "<br><br>" +
    "Maturity Amount : ₹" + maturity;
}

</script>

</body>
</html>
